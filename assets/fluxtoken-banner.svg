<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FluxToken model gateway banner</title>
  <desc id="desc">FluxToken is an OpenAI-compatible multi-model gateway for Claude, GPT, and document workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="0.42" stop-color="#10233A"/>
      <stop offset="1" stop-color="#3B1023"/>
    </linearGradient>
    <linearGradient id="accent" x1="170" y1="78" x2="1032" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#F43F5E"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <path d="M64 293C185 221 291 209 407 251C555 305 684 274 797 194C926 103 1044 82 1136 115" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M69 307C232 247 336 257 455 292C577 328 727 298 858 217C976 144 1052 129 1133 153" stroke="#E5E7EB" stroke-width="1.4" stroke-linecap="round" opacity="0.3"/>

  <g filter="url(#softShadow)">
    <rect x="72" y="70" width="210" height="210" rx="42" fill="#0F172A" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <path d="M174 112C209 112 237 140 237 175C237 210 209 238 174 238C139 238 111 210 111 175C111 140 139 112 174 112Z" fill="#111827"/>
    <path d="M174 119C197 119 218 132 228 153C205 145 183 153 170 171C158 188 137 196 117 190C115 185 114 180 114 175C114 144 139 119 174 119Z" fill="#38BDF8"/>
    <path d="M229 158C232 164 234 169 234 175C234 206 209 231 178 231C155 231 134 218 124 197C147 205 169 197 182 179C194 162 215 154 229 158Z" fill="#F43F5E"/>
    <circle cx="174" cy="175" r="19" fill="#F8FAFC"/>
    <circle cx="174" cy="175" r="8" fill="#111827"/>
  </g>

  <text x="326" y="125" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="0">FluxToken</text>
  <text x="329" y="171" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">OpenAI-compatible multi-model gateway for Redbot</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="650">
    <rect x="328" y="207" width="142" height="42" rx="12" fill="rgba(56,189,248,0.16)" stroke="rgba(125,211,252,0.45)"/>
    <text x="352" y="235" fill="#BAE6FD">Claude</text>
    <rect x="486" y="207" width="92" height="42" rx="12" fill="rgba(244,63,94,0.16)" stroke="rgba(251,113,133,0.45)"/>
    <text x="514" y="235" fill="#FDA4AF">GPT</text>
    <rect x="594" y="207" width="169" height="42" rx="12" fill="rgba(251,191,36,0.16)" stroke="rgba(252,211,77,0.45)"/>
    <text x="619" y="235" fill="#FDE68A">Usage Logs</text>
    <rect x="779" y="207" width="198" height="42" rx="12" fill="rgba(148,163,184,0.14)" stroke="rgba(203,213,225,0.36)"/>
    <text x="804" y="235" fill="#E2E8F0">Unified API Key</text>
  </g>

  <text x="329" y="288" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Set REDBOT_BASE_URL=https://fluxtoken.ai/v1</text>
  <text x="329" y="319" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Provider-neutral: keep Redbot open-source, choose the backend you trust.</text>
</svg>
